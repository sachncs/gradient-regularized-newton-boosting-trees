name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check import sorting with isort
        run: isort --check-only --diff grnbt tests experiments

      - name: Check formatting with black
        run: black --check --diff grnbt tests experiments

      - name: Type check with mypy
        run: mypy grnbt --ignore-missing-imports

      - name: Run test suite
        run: pytest tests/ -v --tb=short

      - name: Run experiment smoke tests
        run: |
          python experiments/ablations.py
          python experiments/wine_charbonnier.py
          python experiments/higgs_diagnostics.py
